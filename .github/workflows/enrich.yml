name: Enrich crane CRM batch

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many rows to process in this run"
        required: true
        default: "100"
      output_name:
        description: "Output CSV name"
        required: true
        default: "enriched_companies_batch.csv"
      groq_enabled:
        description: "Use Groq? true/false"
        required: true
        default: "true"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_ENABLED: ${{ github.event.inputs.groq_enabled }}
      GROQ_CACHE_ENABLED: "true"
      GROQ_SKIP_LOW_EVIDENCE: "true"
      GROQ_SKIP_CONFIDENT_HEURISTICS: "true"
      GROQ_MAX_SEARCH_ITEMS: "4"
      GROQ_MAX_PAGES: "2"
      GROQ_PAGE_EXCERPT_CHARS: "900"
      GROQ_RECORD_NOTES_CHARS: "400"
      GROQ_MAX_TOKENS: "700"
      MAX_SEARCH_RESULTS: "5"
      MAX_PAGES_TO_SCRAPE: "2"
      REQUEST_TIMEOUT_SECONDS: "15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure output folders exist
        run: |
          mkdir -p data/output
          mkdir -p data/cache

      - name: Run enrichment batch
        run: |
          python -m src.enrich_pipeline \
            --input "data/input/!E-MAIL PEDIDOS MUNDO.xlsx" \
            --output "data/output/${{ github.event.inputs.output_name }}" \
            --limit "${{ github.event.inputs.limit }}"

      - name: Upload enriched CSV
        uses: actions/upload-artifact@v4
        with:
          name: enriched-crane-crm
          path: |
            data/output/${{ github.event.inputs.output_name }}
            data/cache/search_cache.json
            data/cache/llm_cache.json
